<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valerie's Summer Writing</title>
<style>
  :root{
    --teal:#1f8a78; --teal-dark:#156a5c; --green:#3aa655; --gray:#9aa5b1;
    --bg:#f1f8f6; --card:#ffffff; --text:#26332f; --accent:#f0a93c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--teal-dark);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{margin:0;font-size:19px;}
  header a.back{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;}
  .layout{display:flex;min-height:calc(100vh - 58px);}
  nav{width:230px;background:#e3f0ec;padding:12px;overflow-y:auto;flex-shrink:0;}
  .week-block{margin-bottom:10px;}
  .week-title{font-weight:600;font-size:13px;color:var(--teal-dark);padding:6px 4px;}
  .week-btn{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;border:none;background:#fff;border-radius:6px;padding:8px 10px;margin:4px 0;cursor:pointer;font-size:13px;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .week-btn.active{outline:2px solid var(--teal);}
  .week-btn .badge{font-size:11px;border-radius:10px;padding:1px 7px;color:#fff;background:var(--gray);}
  .week-btn.done .badge{background:var(--green);}
  main{flex:1;padding:22px;max-width:760px;}
  .card{background:var(--card);border-radius:10px;padding:20px 24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .card h2{margin-top:0;color:var(--teal-dark);}
  .section-label{display:inline-block;background:var(--teal);color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;margin-bottom:10px;}
  .prompt-text{font-size:15px;line-height:1.6;background:#f3faf8;border-radius:8px;padding:14px 16px;margin-bottom:16px;}
  textarea{width:100%;min-height:320px;font-size:15px;line-height:1.6;font-family:inherit;border:1px solid #ccc;border-radius:8px;padding:14px;resize:vertical;}
  textarea:focus{outline:2px solid var(--teal);border-color:transparent;}
  .meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:#888;}
  .save-status{color:var(--green);font-weight:600;}
  .nav-footer{font-size:11px;color:#5e7d75;padding:10px 6px;}
  .feedback-actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .feedback-actions button, .feedback-actions a{font-size:13px;padding:9px 14px;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn-copy{background:var(--teal);color:#fff;border:none;}
  .btn-link{background:#fff;color:var(--teal-dark);border:1px solid var(--teal-dark);}
  textarea.feedback-area{min-height:160px;background:#fffaf0;}
  .feedback-hint{font-size:12px;color:#888;margin:0 0 12px;}
  @media (max-width:760px){.layout{flex-direction:column;}nav{width:100%;}main{padding:14px;}}
</style>
</head>
<body>
<header>
  <h1>✍️ Valerie's Summer Writing</h1>
  <a class="back" href="../index.html">← All Subjects</a>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase-config.js"></script>
<script src="../shared/cloudsync.js"></script>
<script src="data.js"></script>
<script>
const STORE_KEY = "valerieSummerWritingReview";
const GPT_URL = "https://chatgpt.com/g/g-6a361d20f96481918541376b510ce10a-summer-writing-tutor";
let progress = {};
function saveProgress(p){ progress = p; saveSyncedProgress(STORE_KEY, p); }

let currentWeek = 1;

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  for(let g=0; g<6; g++){
    const block = document.createElement("div");
    block.className = "week-block";
    const title = document.createElement("div");
    title.className = "week-title";
    title.textContent = `Week ${g*6+1}–${g*6+6}`;
    block.appendChild(title);
    WRITING_PROMPTS.slice(g*6, g*6+6).forEach(w=>{
      const rec = progress[w.week];
      const hasText = rec && rec.text && rec.text.trim().length > 0;
      const btn = document.createElement("button");
      btn.className = "week-btn" + (hasText ? " done" : "") + (w.week===currentWeek ? " active" : "");
      btn.innerHTML = `<span>Week ${w.week}</span><span class="badge">${hasText ? "✓" : "-"}</span>`;
      btn.onclick = ()=>{ currentWeek = w.week; render(); };
      block.appendChild(btn);
    });
    nav.appendChild(block);
  }
  const footer = document.createElement("div");
  footer.className = "nav-footer";
  footer.textContent = CloudSync.enabled ? "✓ Progress synced across devices" : "Progress is saved on this device only.";
  nav.appendChild(footer);
}

function wordCount(text){
  const t = text.trim();
  return t ? t.split(/\s+/).length : 0;
}

function render(){
  renderNav();
  const w = WRITING_PROMPTS.find(p=>p.week===currentWeek);
  const main = document.getElementById("main");
  const rec = progress[w.week] || {};
  const text = rec.text || "";
  const feedback = rec.feedback || "";
  const revisedText = rec.revisedText || "";
  const revisedFeedback = rec.revisedFeedback || "";

  main.innerHTML = `
    <div class="card">
      <span class="section-label">Week ${w.week} · ${w.type}</span>
      <h2>Writing Prompt</h2>
      <div class="prompt-text">${w.prompt}</div>
      <textarea id="writingArea" placeholder="Start writing here...">${text}</textarea>
      <div class="meta-row">
        <span id="wordCount">${wordCount(text)} words</span>
        <span class="save-status" id="saveStatus">${text ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Get Feedback</span>
      <h2>Writing Tutor</h2>
      <p class="feedback-hint">1) Copy your writing &nbsp;2) Paste it into the Writing Tutor &nbsp;3) Copy its feedback back here.</p>
      <div class="feedback-actions" id="actions1">
        <button class="btn-copy" onclick="copyRound1()">📋 Copy My Writing</button>
        <a class="btn-link" href="${GPT_URL}" target="_blank" rel="noopener">🤖 Open Writing Tutor ↗</a>
      </div>
      <textarea class="feedback-area" id="feedbackArea" placeholder="Paste the Writing Tutor's feedback here...">${feedback}</textarea>
      <div class="meta-row">
        <span></span>
        <span class="save-status" id="feedbackSaveStatus">${feedback ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Revise</span>
      <h2>Revised Writing</h2>
      <p class="feedback-hint">After reading the feedback, rewrite or improve your paragraph here.</p>
      <textarea id="revisedArea" placeholder="Write your revised version here...">${revisedText}</textarea>
      <div class="meta-row">
        <span id="revisedWordCount">${wordCount(revisedText)} words</span>
        <span class="save-status" id="revisedSaveStatus">${revisedText ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Get Updated Feedback</span>
      <h2>Writing Tutor — Round 2</h2>
      <p class="feedback-hint">1) Copy your revised writing &nbsp;2) Paste it into the Writing Tutor &nbsp;3) Copy its updated feedback back here.</p>
      <div class="feedback-actions" id="actions2">
        <button class="btn-copy" onclick="copyRound2()">📋 Copy My Revised Writing</button>
        <a class="btn-link" href="${GPT_URL}" target="_blank" rel="noopener">🤖 Open Writing Tutor ↗</a>
      </div>
      <textarea class="feedback-area" id="revisedFeedbackArea" placeholder="Paste the Writing Tutor's updated feedback here...">${revisedFeedback}</textarea>
      <div class="meta-row">
        <span></span>
        <span class="save-status" id="revisedFeedbackSaveStatus">${revisedFeedback ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card" style="display:flex;justify-content:space-between;">
      <button onclick="goAdjacent(-1)" ${w.week<=1?"disabled":""} style="background:#fff;color:var(--teal-dark);border:1px solid var(--teal-dark);border-radius:6px;padding:8px 16px;cursor:pointer;">&larr; Previous Week</button>
      <button onclick="goAdjacent(1)" ${w.week>=36?"disabled":""} style="background:var(--teal);color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;">Next Week &rarr;</button>
    </div>
  `;
  document.getElementById("writingArea").addEventListener("input", makeFieldSaver({
    field:"text", statusId:"saveStatus", wordCountId:"wordCount", refreshNav:true
  }));
  document.getElementById("feedbackArea").addEventListener("input", makeFieldSaver({
    field:"feedback", statusId:"feedbackSaveStatus"
  }));
  document.getElementById("revisedArea").addEventListener("input", makeFieldSaver({
    field:"revisedText", statusId:"revisedSaveStatus", wordCountId:"revisedWordCount"
  }));
  document.getElementById("revisedFeedbackArea").addEventListener("input", makeFieldSaver({
    field:"revisedFeedback", statusId:"revisedFeedbackSaveStatus"
  }));
}

const fieldSaveTimers = {};
function makeFieldSaver({field, statusId, wordCountId, refreshNav}){
  return function(e){
    const val = e.target.value;
    if(wordCountId) document.getElementById(wordCountId).textContent = wordCount(val) + " words";
    document.getElementById(statusId).textContent = "Saving…";
    clearTimeout(fieldSaveTimers[field]);
    fieldSaveTimers[field] = setTimeout(()=>{
      progress[currentWeek] = { ...(progress[currentWeek]||{}), [field]: val, [field+"Date"]: new Date().toISOString() };
      saveProgress(progress);
      document.getElementById(statusId).textContent = "✓ Saved";
      if(refreshNav) renderNavOnly();
    }, 500);
  };
}

function copyRound1(){
  const w = WRITING_PROMPTS.find(p=>p.week===currentWeek);
  const text = document.getElementById("writingArea").value;
  const combined = `Writing Prompt (Week ${w.week} – ${w.type}):\n${w.prompt}\n\nMy Writing:\n${text}`;
  doCopy(combined, ".btn-copy", "#actions1");
}

function copyRound2(){
  const revisedText = document.getElementById("revisedArea").value;
  doCopy(revisedText, "#actions2 .btn-copy", "#actions2");
}

function doCopy(combined, btnSelector, actionsSelector){
  const btn = document.querySelector(btnSelector);
  const original = btn.textContent;
  const flash = (label)=>{ btn.textContent = label; setTimeout(()=>{ btn.textContent = original; }, 2200); };

  const legacyCopyFallback = ()=>{
    // hidden textarea + execCommand('copy') works without the Permissions API
    // in most real browsers (just not in this sandboxed preview).
    const temp = document.createElement("textarea");
    temp.value = combined;
    temp.style.position = "fixed";
    temp.style.top = "-9999px";
    document.body.appendChild(temp);
    temp.focus();
    temp.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(e) { ok = false; }
    document.body.removeChild(temp);
    if(ok){
      flash("✓ Copied!");
    } else {
      showCopyPreview(combined, actionsSelector);
      flash("📋 See box below — select & copy");
    }
  };

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(combined).then(()=>flash("✓ Copied!")).catch(legacyCopyFallback);
  } else {
    legacyCopyFallback();
  }
}

function showCopyPreview(text, actionsSelector){
  const actions = document.querySelector(actionsSelector);
  const boxId = actionsSelector.replace(/[^a-zA-Z0-9]/g,"") + "PreviewBox";
  let box = document.getElementById(boxId);
  if(!box){
    box = document.createElement("textarea");
    box.id = boxId;
    box.className = "feedback-area";
    box.style.marginTop = "10px";
    box.readOnly = true;
    actions.insertAdjacentElement("afterend", box);
  }
  box.value = text;
  box.style.display = "block";
  box.focus();
  box.select();
}

function renderNavOnly(){
  // avoid full re-render (which would blur the textarea) — just refresh nav badges
  renderNav();
}

function goAdjacent(delta){
  const newWeek = currentWeek + delta;
  if(newWeek>=1 && newWeek<=36){ currentWeek = newWeek; render(); }
}

initSyncedProgress(STORE_KEY).then(p => { progress = p; render(); });
</script>
</body>
</html>
