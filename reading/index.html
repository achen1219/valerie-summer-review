<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valerie's Summer Reading</title>
<style>
  :root{
    --purple:#6c4f9e; --purple-dark:#4f3875; --green:#3aa655; --gray:#9aa5b1;
    --bg:#f6f3fa; --card:#ffffff; --text:#2e2640; --accent:#f0a93c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--purple-dark);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{margin:0;font-size:19px;}
  header a.back{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;}
  .layout{display:flex;min-height:calc(100vh - 58px);}
  nav{width:230px;background:#ece5f5;padding:12px;overflow-y:auto;flex-shrink:0;}
  .week-block{margin-bottom:10px;}
  .week-title{font-weight:600;font-size:13px;color:var(--purple-dark);padding:6px 4px;}
  .unit-header{display:block;width:100%;text-align:left;border:none;background:none;padding:10px 4px 6px;margin:0;cursor:pointer;font-size:14px;font-weight:700;color:var(--purple-dark);}
  .unit-header:hover{color:var(--purple);}
  .day-btn{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;border:none;background:#fff;border-radius:6px;padding:8px 10px;margin:4px 0;cursor:pointer;font-size:13px;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .day-btn.active{outline:2px solid var(--purple);}
  .day-btn .badge{font-size:11px;border-radius:10px;padding:1px 7px;color:#fff;background:var(--gray);}
  .day-btn.done .badge{background:var(--green);}
  main{flex:1;padding:22px;max-width:780px;}
  .card{background:var(--card);border-radius:10px;padding:20px 24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .card h2{margin-top:0;color:var(--purple-dark);}
  .section-label{display:inline-block;background:var(--purple);color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;margin-bottom:10px;}
  .as-you-read{background:#fdf6e3;border:1px solid #f0d9a0;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
  .passage{font-size:15px;line-height:1.7;background:#faf8fd;border:1px solid #e6ddf0;border-radius:8px;padding:16px 18px;white-space:pre-wrap;}
  .page-image{max-width:100%;border:1px solid #e6ddf0;border-radius:8px;display:block;margin:0 auto;}
  .page-image-note{font-size:12px;color:#888;text-align:center;margin-top:6px;}
  .ref-check{display:flex;align-items:center;gap:8px;font-size:14px;margin-top:14px;padding:10px 14px;background:#f3eef9;border-radius:8px;cursor:pointer;}
  .prob{margin:16px 0;padding-bottom:16px;border-bottom:1px solid #eee;}
  .prob:last-child{border-bottom:none;}
  .prob p.qtext{margin:0 0 10px;font-weight:600;white-space:pre-wrap;}
  .opt-row{display:flex;align-items:flex-start;gap:8px;margin:6px 0;padding:6px 8px;border-radius:6px;cursor:pointer;}
  .opt-row:hover{background:#f7f3fb;}
  .opt-row input{margin-top:3px;}
  .test-result{margin-top:6px;font-size:13px;font-weight:600;}
  .ok{color:var(--green);}
  .bad{color:#c0392b;}
  button{background:var(--purple);color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;}
  button:hover{background:var(--purple-dark);}
  button:disabled{opacity:.5;cursor:default;}
  .scorebox{margin-top:14px;padding:14px;border-radius:8px;background:#eaf6ea;font-size:15px;}
  .progress-bar{width:100%;background:#e3d9ef;border-radius:6px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-bar > div{height:100%;background:var(--green);}
  .nav-footer{font-size:11px;color:#7a6d92;padding:10px 6px;}
  textarea{width:100%;min-height:80px;font-size:14px;line-height:1.6;font-family:inherit;border:1px solid #ccc;border-radius:8px;padding:10px;resize:vertical;}
  textarea:focus{outline:2px solid var(--purple);border-color:transparent;}
  .save-status{color:var(--green);font-weight:600;font-size:12px;}
  .table-row{display:flex;gap:10px;align-items:flex-start;margin:8px 0;}
  .table-row label{width:70px;flex-shrink:0;font-size:13px;font-weight:600;padding-top:8px;}
  .table-row .given{flex:1;font-size:13px;padding:10px;background:#f3eef9;border-radius:6px;color:#555;}
  .compare3-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0;}
  .compare-col{flex:1;min-width:160px;}
  .compare-col label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}
  .feedback-actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .feedback-actions button, .feedback-actions a{font-size:13px;padding:9px 14px;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn-copy{background:var(--purple);color:#fff;border:none;}
  .btn-link{background:#fff;color:var(--purple-dark);border:1px solid var(--purple-dark);}
  textarea.feedback-area{min-height:160px;background:#fffaf0;}
  .feedback-hint{font-size:12px;color:#888;margin:0 0 12px;}
  @media (max-width:760px){.layout{flex-direction:column;}nav{width:100%;}main{padding:14px;}}
</style>
</head>
<body>
<header>
  <h1>📖 Valerie's Summer Reading</h1>
  <a class="back" href="../index.html">← All Subjects</a>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase-config.js"></script>
<script src="../shared/cloudsync.js"></script>
<script src="data.js"></script>
<script>
const STORE_KEY = "valerieSummerReadingReview";
const GPT_URL = "https://chatgpt.com/g/g-6a361d20f96481918541376b510ce10a-summer-writing-tutor";
let progress = {};
function saveProgress(p){ progress = p; saveSyncedProgress(STORE_KEY, p); }

let currentWeekId = 1;
let currentDay = 1;
const fieldSaveTimers = {};

function recKey(weekId, day){ return weekId + "_" + day; }
function getRec(weekId, day){ return progress[recKey(weekId, day)] || {}; }

function dayMastered(rec, day){
  const mcQs = day.questions ? day.questions.filter(q=>q.type==="mc") : [];
  if(mcQs.length === 0) return !!rec.checked; // writing/no-MC days: just "started" isn't "done"; handled separately
  return !!rec.completed;
}

function unitOf(week){
  const m = week.label.match(/^Unit (\d+)/);
  return m ? m[1] : week.label;
}

const collapsedUnits = {}; // unitId -> true if collapsed; undefined = default (expanded only if current)
function isUnitCollapsed(unitId, hasCurrentWeek){
  if(collapsedUnits.hasOwnProperty(unitId)) return collapsedUnits[unitId];
  return !hasCurrentWeek; // default: only the unit containing the current week starts expanded
}

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";

  const units = [];
  READING_WEEKS.forEach(week=>{
    const uid = unitOf(week);
    let u = units.find(x=>x.id===uid);
    if(!u){ u = {id:uid, weeks:[]}; units.push(u); }
    u.weeks.push(week);
  });

  units.forEach(unit=>{
    const hasCurrentWeek = unit.weeks.some(w=>w.id===currentWeekId);
    const collapsed = isUnitCollapsed(unit.id, hasCurrentWeek);

    const unitHeader = document.createElement("button");
    unitHeader.className = "unit-header";
    unitHeader.innerHTML = `<span>${collapsed?"▸":"▾"} Unit ${unit.id}</span>`;
    unitHeader.onclick = ()=>{ collapsedUnits[unit.id] = !collapsed; renderNav(); };
    nav.appendChild(unitHeader);

    if(collapsed) return;

    unit.weeks.forEach(week=>{
      const block = document.createElement("div");
      block.className = "week-block";
      const title = document.createElement("div");
      title.className = "week-title";
      title.textContent = week.label;
      block.appendChild(title);
      week.days.forEach(day=>{
        const rec = getRec(week.id, day.day);
        const isWriting = day.type === "writing";
        const isReference = day.type === "reference";
        const done = isWriting ? !!(rec.text && rec.text.trim()) : (isReference ? !!rec.markedDone : dayMastered(rec, day));
        const btn = document.createElement("button");
        btn.className = "day-btn" + (done ? " done" : "") + (week.id===currentWeekId && day.day===currentDay ? " active" : "");
        const badgeText = done ? "✓" : (rec.checked || (isWriting && rec.text) ? "…" : "-");
        btn.innerHTML = `<span>Day ${day.day}</span><span class="badge">${badgeText}</span>`;
        btn.onclick = ()=>{ currentWeekId = week.id; currentDay = day.day; render(); };
        block.appendChild(btn);
      });
      nav.appendChild(block);
    });
  });

  const footer = document.createElement("div");
  footer.className = "nav-footer";
  footer.textContent = CloudSync.enabled ? "✓ Progress synced across devices" : "Progress is saved on this device only.";
  nav.appendChild(footer);
}

function norm(s){ return String(s).trim().toLowerCase(); }

function render(){
  renderNav();
  const week = READING_WEEKS.find(w=>w.id===currentWeekId);
  const day = week.days.find(d=>d.day===currentDay);
  const main = document.getElementById("main");
  const rec = getRec(week.id, day.day);

  if(day.type === "writing"){
    renderWritingDay(week, day, rec, main);
    return;
  }

  if(day.type === "reference"){
    renderReferenceDay(week, day, rec, main);
    return;
  }

  const questionsHtml = day.questions.map((q,i)=>{
    if(q.type === "mc"){
      const chosen = rec.answers ? rec.answers[i] : undefined;
      const optsHtml = q.options.map((opt,j)=>{
        const checked = chosen === j ? "checked" : "";
        return `<label class="opt-row">
          <input type="radio" name="q${i}" value="${j}" ${checked} ${rec.completed?"disabled":""}>
          <span>${opt}</span>
        </label>`;
      }).join("");
      return `<div class="prob">
        <p class="qtext">${i+1}. ${q.q}</p>
        ${optsHtml}
        <div class="test-result" id="r_${i}"></div>
      </div>`;
    }
    if(q.type === "open"){
      const val = (rec.openAnswers && rec.openAnswers[i]) || "";
      return `<div class="prob">
        <p class="qtext">${i+1}. ${q.q}</p>
        <textarea id="open_${i}" style="min-height:${24*q.lines}px" placeholder="Type your answer...">${val}</textarea>
        <div class="save-status" id="openStatus_${i}"></div>
      </div>`;
    }
    if(q.type === "open-table"){
      const vals = (rec.openTable && rec.openTable[i]) || {};
      const rows = q.rows.map((row,ri)=>{
        if(row.given){
          return `<div class="table-row"><label>${row.label}</label><div class="given">${row.given}</div></div>`;
        }
        const v = vals[ri] || "";
        return `<div class="table-row"><label>${row.label}</label><textarea id="tbl_${i}_${ri}" style="min-height:44px">${v}</textarea></div>`;
      }).join("");
      return `<div class="prob">
        <p class="qtext">${i+1}. ${q.q}</p>
        ${rows}
        <div class="save-status" id="openStatus_${i}"></div>
      </div>`;
    }
    if(q.type === "compare3"){
      const vals = (rec.openTable && rec.openTable[i]) || {};
      const cols = q.columns.map((colLabel,ri)=>{
        const v = vals[ri] || "";
        return `<div class="compare-col"><label>${colLabel}</label><textarea id="tbl_${i}_${ri}" style="min-height:90px">${v}</textarea></div>`;
      }).join("");
      return `<div class="prob">
        <p class="qtext">${i+1}. ${q.q}</p>
        <div class="compare3-row">${cols}</div>
        <div class="save-status" id="openStatus_${i}"></div>
      </div>`;
    }
    return "";
  }).join("");

  const hasMc = day.questions.some(q=>q.type==="mc");

  main.innerHTML = `
    <div class="card">
      <span class="section-label">${week.label} · Day ${day.day}</span>
      <h2>${day.title}</h2>
      ${day.asYouRead ? `<div class="as-you-read"><b>As You Read:</b> ${day.asYouRead}</div>` : ""}
      ${day.passageImage
        ? `<img class="page-image" src="${day.passageImage}" alt="${day.title}"><div class="page-image-note">This page is a designed graphic in the workbook, shown here as the original page.</div>`
        : `<div class="passage">${day.passage}</div>`}
    </div>
    <div class="card">
      <span class="section-label">Questions</span>
      ${questionsHtml}
      ${hasMc ? `<button id="checkBtn" onclick="checkAnswers()" ${rec.completed?"disabled":""}>${rec.completed?"All Correct ✓":"Check Answers"}</button>
      <div id="scorebox">${rec.completed ? scoreBoxHtml(rec) : ""}</div>` : ""}
    </div>
    <div class="card" style="display:flex;justify-content:space-between;">
      <button onclick="goAdjacent(-1)" ${day.day<=1?"disabled":""} style="background:#fff;color:var(--purple-dark);border:1px solid var(--purple-dark);">&larr; Previous Day</button>
      <button onclick="goAdjacent(1)" ${day.day>=week.days.length?"disabled":""}>Next Day &rarr;</button>
    </div>
  `;

  if(rec.checked || rec.completed){
    day.questions.forEach((q,i)=>{
      if(q.type !== "mc") return;
      const el = document.getElementById(`r_${i}`);
      const given = rec.answers[i];
      const ok = given === q.correct;
      el.innerHTML = ok ? `<span class="ok">✓ Correct</span>` : `<span class="bad">✗ Not quite — try again</span>`;
    });
  }

  day.questions.forEach((q,i)=>{
    if(q.type === "open"){
      document.getElementById(`open_${i}`).addEventListener("input", (e)=>saveOpenAnswer(i, e.target.value));
    }
    if(q.type === "open-table"){
      q.rows.forEach((row,ri)=>{
        if(row.given) return;
        const el = document.getElementById(`tbl_${i}_${ri}`);
        el.addEventListener("input", ()=>saveOpenTable(i, q.rows.length));
      });
    }
    if(q.type === "compare3"){
      q.columns.forEach((col,ri)=>{
        const el = document.getElementById(`tbl_${i}_${ri}`);
        el.addEventListener("input", ()=>saveOpenTable(i, q.columns.length));
      });
    }
  });
}

function scoreBoxHtml(rec){
  const initial = typeof rec.initialScore === "number" ? rec.initialScore : rec.score;
  const sameAsFinal = initial === rec.score;
  return `<div class="scorebox">Score: <b>${rec.score}%</b>
    <div class="progress-bar"><div style="width:${rec.score}%"></div></div>
    ${sameAsFinal ? "" : `<div style="margin-top:8px;font-size:13px;color:#555;">First attempt: <b>${initial}%</b> — corrected ${rec.wrongOnFirstTry ? rec.wrongOnFirstTry.length : ""} question(s) on resubmission.</div>`}
  </div>`;
}

function checkAnswers(){
  const week = READING_WEEKS.find(w=>w.id===currentWeekId);
  const day = week.days.find(d=>d.day===currentDay);
  const key = recKey(week.id, day.day);
  const existing = progress[key] || {};
  const mcIndices = day.questions.map((q,i)=>q.type==="mc"?i:null).filter(i=>i!==null);
  let correctCount = 0;
  const answers = day.questions.map((q,i)=>{
    if(q.type !== "mc") return existing.answers ? existing.answers[i] : undefined;
    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    const val = checked ? parseInt(checked.value) : -1;
    if(val === q.correct) correctCount++;
    return val;
  });
  const allCorrect = correctCount === mcIndices.length;
  const now = new Date().toISOString();
  const rec = { ...existing, answers, checked:true, completed:allCorrect, date:now };

  if(!existing.checked){
    rec.initialAnswers = answers.slice();
    rec.initialScore = Math.round((correctCount/mcIndices.length)*100);
    rec.wrongOnFirstTry = mcIndices.filter(i=>answers[i] !== day.questions[i].correct);
    rec.firstCheckedDate = now;
  }

  if(allCorrect){
    rec.score = 100;
    rec.completedDate = now;
  } else {
    delete rec.score;
  }

  progress[key] = rec;
  saveProgress(progress);
  render();
}

function saveOpenAnswer(i, val){
  const key = recKey(currentWeekId, currentDay);
  document.getElementById(`openStatus_${i}`).textContent = "Saving…";
  clearTimeout(fieldSaveTimers[key+"_"+i]);
  fieldSaveTimers[key+"_"+i] = setTimeout(()=>{
    const existing = progress[key] || {};
    const openAnswers = { ...(existing.openAnswers||{}), [i]: val };
    progress[key] = { ...existing, openAnswers, date: new Date().toISOString() };
    saveProgress(progress);
    document.getElementById(`openStatus_${i}`).textContent = "✓ Saved";
  }, 500);
}

function saveOpenTable(i, rowCount){
  const key = recKey(currentWeekId, currentDay);
  document.getElementById(`openStatus_${i}`).textContent = "Saving…";
  clearTimeout(fieldSaveTimers[key+"_"+i]);
  fieldSaveTimers[key+"_"+i] = setTimeout(()=>{
    const vals = {};
    for(let ri=0; ri<rowCount; ri++){
      const el = document.getElementById(`tbl_${i}_${ri}`);
      if(el) vals[ri] = el.value;
    }
    const existing = progress[key] || {};
    const openTable = { ...(existing.openTable||{}), [i]: vals };
    progress[key] = { ...existing, openTable, date: new Date().toISOString() };
    saveProgress(progress);
    document.getElementById(`openStatus_${i}`).textContent = "✓ Saved";
  }, 500);
}

// ================== Reference-only day (drawing/design tasks) ==================
function renderReferenceDay(week, day, rec, main){
  const notes = rec.notes || "";
  main.innerHTML = `
    <div class="card">
      <span class="section-label">${week.label} · Day ${day.day}</span>
      <h2>${day.title}</h2>
      <p style="font-size:13px;color:#666;">${day.instructions}</p>
      <p style="font-size:13px;color:#888;background:#fdf6e3;border:1px solid #f0d9a0;border-radius:8px;padding:10px 14px;">
        📝 This activity involves drawing or designing, so it works better on paper or printed out, instead of typing on the site. The actual workbook page is shown below — print it, or have her draw on a blank sheet using the directions.
      </p>
      <img class="page-image" src="${day.pageImage}" alt="${day.title}">
      <a class="btn-link" style="display:inline-block;margin-top:10px;text-decoration:none;padding:8px 14px;border-radius:6px;border:1px solid var(--purple-dark);color:var(--purple-dark);" href="${day.pageImage}" target="_blank" rel="noopener">🖨️ Open full-size to print</a>
    </div>
    <div class="card">
      <span class="section-label">Notes (optional)</span>
      <p style="font-size:13px;color:#666;">If she'd rather type a quick description instead of drawing, she can do that here.</p>
      <textarea id="notesArea" placeholder="Optional: describe what you drew or designed...">${notes}</textarea>
      <div class="meta-row" style="display:flex;justify-content:flex-end;margin-top:8px;">
        <span class="save-status" id="notesSaveStatus">${notes ? "✓ Saved" : ""}</span>
      </div>
      <label class="ref-check">
        <input type="checkbox" id="markDoneChk" ${rec.markedDone?"checked":""}> ✓ I finished this on paper
      </label>
    </div>
    <div class="card" style="display:flex;justify-content:space-between;">
      <button onclick="goAdjacent(-1)" ${day.day<=1?"disabled":""} style="background:#fff;color:var(--purple-dark);border:1px solid var(--purple-dark);">&larr; Previous Day</button>
      <button onclick="goAdjacent(1)" ${day.day>=week.days.length?"disabled":""}>Next Day &rarr;</button>
    </div>
  `;
  document.getElementById("notesArea").addEventListener("input", makeFieldSaver({field:"notes", statusId:"notesSaveStatus"}));
  document.getElementById("markDoneChk").addEventListener("change", (e)=>{
    const key = recKey(week.id, day.day);
    const existing = progress[key] || {};
    progress[key] = { ...existing, markedDone: e.target.checked, date: new Date().toISOString() };
    saveProgress(progress);
    renderNav();
  });
}

// ================== Day 5: Writing-style day ==================
function renderWritingDay(week, day, rec, main){
  const text = rec.text || "";
  const feedback = rec.feedback || "";
  const revisedText = rec.revisedText || "";
  const revisedFeedback = rec.revisedFeedback || "";

  main.innerHTML = `
    <div class="card">
      <span class="section-label">${week.label} · Day ${day.day}</span>
      <h2>${day.title}</h2>
      <p style="font-size:13px;color:#666;">${day.instructions}</p>
      <div class="passage">${day.prompt}</div>
      <textarea id="writingArea" placeholder="Start writing here...">${text}</textarea>
      <div class="meta-row" style="display:flex;justify-content:space-between;margin-top:8px;">
        <span id="wordCount" style="font-size:12px;color:#888;">${wordCount(text)} words</span>
        <span class="save-status" id="saveStatus">${text ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Get Feedback</span>
      <h2>Writing Tutor</h2>
      <p class="feedback-hint">1) Copy your writing &nbsp;2) Paste it into the Writing Tutor &nbsp;3) Copy its feedback back here.</p>
      <div class="feedback-actions" id="actions1">
        <button class="btn-copy" onclick="copyRound1()">📋 Copy My Writing</button>
        <a class="btn-link" href="${GPT_URL}" target="_blank" rel="noopener">🤖 Open Writing Tutor ↗</a>
      </div>
      <textarea class="feedback-area" id="feedbackArea" placeholder="Paste the Writing Tutor's feedback here...">${feedback}</textarea>
      <div class="meta-row" style="display:flex;justify-content:flex-end;margin-top:8px;">
        <span class="save-status" id="feedbackSaveStatus">${feedback ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Revise</span>
      <h2>Revised Writing</h2>
      <p class="feedback-hint">After reading the feedback, rewrite or improve your response here.</p>
      <textarea id="revisedArea" placeholder="Write your revised version here...">${revisedText}</textarea>
      <div class="meta-row" style="display:flex;justify-content:space-between;margin-top:8px;">
        <span id="revisedWordCount" style="font-size:12px;color:#888;">${wordCount(revisedText)} words</span>
        <span class="save-status" id="revisedSaveStatus">${revisedText ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Get Updated Feedback</span>
      <h2>Writing Tutor — Round 2</h2>
      <p class="feedback-hint">1) Copy your revised writing &nbsp;2) Paste it into the Writing Tutor &nbsp;3) Copy its updated feedback back here.</p>
      <div class="feedback-actions" id="actions2">
        <button class="btn-copy" onclick="copyRound2()">📋 Copy My Revised Writing</button>
        <a class="btn-link" href="${GPT_URL}" target="_blank" rel="noopener">🤖 Open Writing Tutor ↗</a>
      </div>
      <textarea class="feedback-area" id="revisedFeedbackArea" placeholder="Paste the Writing Tutor's updated feedback here...">${revisedFeedback}</textarea>
      <div class="meta-row" style="display:flex;justify-content:flex-end;margin-top:8px;">
        <span class="save-status" id="revisedFeedbackSaveStatus">${revisedFeedback ? "✓ Saved" : ""}</span>
      </div>
    </div>

    <div class="card" style="display:flex;justify-content:space-between;">
      <button onclick="goAdjacent(-1)" style="background:#fff;color:var(--purple-dark);border:1px solid var(--purple-dark);">&larr; Previous Day</button>
      <button onclick="goAdjacent(1)" disabled>Next Day &rarr;</button>
    </div>
  `;
  document.getElementById("writingArea").addEventListener("input", makeFieldSaver({field:"text", statusId:"saveStatus", wordCountId:"wordCount", refreshNav:true}));
  document.getElementById("feedbackArea").addEventListener("input", makeFieldSaver({field:"feedback", statusId:"feedbackSaveStatus"}));
  document.getElementById("revisedArea").addEventListener("input", makeFieldSaver({field:"revisedText", statusId:"revisedSaveStatus", wordCountId:"revisedWordCount"}));
  document.getElementById("revisedFeedbackArea").addEventListener("input", makeFieldSaver({field:"revisedFeedback", statusId:"revisedFeedbackSaveStatus"}));
}

function wordCount(text){
  const t = text.trim();
  return t ? t.split(/\s+/).length : 0;
}

function makeFieldSaver({field, statusId, wordCountId, refreshNav}){
  return function(e){
    const val = e.target.value;
    if(wordCountId) document.getElementById(wordCountId).textContent = wordCount(val) + " words";
    document.getElementById(statusId).textContent = "Saving…";
    const key = recKey(currentWeekId, currentDay);
    const timerKey = key + "_" + field;
    clearTimeout(fieldSaveTimers[timerKey]);
    fieldSaveTimers[timerKey] = setTimeout(()=>{
      const existing = progress[key] || {};
      progress[key] = { ...existing, [field]: val, [field+"Date"]: new Date().toISOString() };
      saveProgress(progress);
      document.getElementById(statusId).textContent = "✓ Saved";
      if(refreshNav) renderNav();
    }, 500);
  };
}

function copyRound1(){
  const week = READING_WEEKS.find(w=>w.id===currentWeekId);
  const day = week.days.find(d=>d.day===currentDay);
  const text = document.getElementById("writingArea").value;
  const combined = `Writing Prompt:\n${day.prompt}\n\nMy Writing:\n${text}`;
  doCopy(combined, ".btn-copy", "#actions1");
}

function copyRound2(){
  const revisedText = document.getElementById("revisedArea").value;
  doCopy(revisedText, "#actions2 .btn-copy", "#actions2");
}

function doCopy(combined, btnSelector, actionsSelector){
  const btn = document.querySelector(btnSelector);
  const original = btn.textContent;
  const flash = (label)=>{ btn.textContent = label; setTimeout(()=>{ btn.textContent = original; }, 2200); };

  const legacyCopyFallback = ()=>{
    const temp = document.createElement("textarea");
    temp.value = combined;
    temp.style.position = "fixed";
    temp.style.top = "-9999px";
    document.body.appendChild(temp);
    temp.focus();
    temp.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(e) { ok = false; }
    document.body.removeChild(temp);
    if(ok){
      flash("✓ Copied!");
    } else {
      showCopyPreview(combined, actionsSelector);
      flash("📋 See box below — select & copy");
    }
  };

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(combined).then(()=>flash("✓ Copied!")).catch(legacyCopyFallback);
  } else {
    legacyCopyFallback();
  }
}

function showCopyPreview(text, actionsSelector){
  const actions = document.querySelector(actionsSelector);
  const boxId = actionsSelector.replace(/[^a-zA-Z0-9]/g,"") + "PreviewBox";
  let box = document.getElementById(boxId);
  if(!box){
    box = document.createElement("textarea");
    box.id = boxId;
    box.className = "feedback-area";
    box.style.marginTop = "10px";
    box.readOnly = true;
    actions.insertAdjacentElement("afterend", box);
  }
  box.value = text;
  box.style.display = "block";
  box.focus();
  box.select();
}

function goAdjacent(delta){
  const week = READING_WEEKS.find(w=>w.id===currentWeekId);
  const newDay = currentDay + delta;
  if(newDay>=1 && newDay<=week.days.length){ currentDay = newDay; render(); }
}

initSyncedProgress(STORE_KEY).then(p => { progress = p; render(); });
</script>
</body>
</html>
