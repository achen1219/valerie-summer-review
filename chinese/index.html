<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valerie's Summer Chinese Review</title>
<style>
  :root{
    --red:#c0392b; --red-dark:#922b21; --green:#3aa655; --gray:#9aa5b1;
    --bg:#fbf6f0; --card:#ffffff; --text:#3a2c25; --accent:#f0a93c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Microsoft JhengHei','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--red-dark);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{margin:0;font-size:19px;}
  header a.back{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;}
  .layout{display:flex;min-height:calc(100vh - 58px);}
  nav{width:220px;background:#f3e6db;padding:12px;overflow-y:auto;flex-shrink:0;}
  .week-btn{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;border:none;background:#fff;border-radius:6px;padding:10px;margin:5px 0;cursor:pointer;font-size:13px;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .week-btn.active{outline:2px solid var(--red);}
  .week-btn .badge{font-size:11px;border-radius:10px;padding:1px 7px;color:#fff;background:var(--gray);}
  .week-btn.done .badge{background:var(--green);}
  main{flex:1;padding:22px;max-width:840px;}
  .card{background:var(--card);border-radius:10px;padding:20px 24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .card h2{margin-top:0;color:var(--red-dark);}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:#f3e6db;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);}
  .tab-btn.active{background:var(--red);color:#fff;}
  .section-label{display:inline-block;background:var(--red);color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;margin-bottom:10px;}
  embed.ppt-viewer{width:100%;height:560px;border:1px solid #ddd;border-radius:8px;}
  video{width:100%;border-radius:8px;background:#000;}
  .resource-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .resource-row a{font-size:13px;color:var(--red-dark);text-decoration:none;background:#f3e6db;padding:6px 12px;border-radius:6px;}
  .resource-row a:hover{background:#e8d4c2;}
  .prob{margin:14px 0;padding-bottom:14px;border-bottom:1px solid #eee;}
  .prob:last-child{border-bottom:none;}
  .prob p{margin:0 0 10px;font-weight:600;}
  .opt-row{display:flex;align-items:flex-start;gap:8px;margin:6px 0;padding:6px 8px;border-radius:6px;cursor:pointer;}
  .opt-row:hover{background:#f7f0e8;}
  .opt-row input{margin-top:3px;}
  .opt-row.correct{background:#eaf6ea;}
  .opt-row.wrong{background:#fbeaea;}
  button{background:var(--red);color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;}
  button:hover{background:var(--red-dark);}
  button:disabled{opacity:.5;cursor:default;}
  .hint{font-size:12px;color:#888;margin-top:4px;display:none;}
  .scorebox{margin-top:14px;padding:14px;border-radius:8px;background:#eaf6ea;font-size:15px;}
  .progress-bar{width:100%;background:#e6dccf;border-radius:6px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-bar > div{height:100%;background:var(--green);}
  .placeholder{font-size:13px;color:#999;padding:20px;text-align:center;background:#f7f0e8;border-radius:8px;}
  .nav-footer{font-size:11px;color:#8a7a6c;padding:10px 6px;}
  .card-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .card-toolbar label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;}
  .flashcard{border:1px solid #eee;border-radius:8px;margin:8px 0;overflow:hidden;}
  .flashcard.reviewed{border-color:#bfe3bf;background:#f7fbf7;}
  .fc-front{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:#fff;}
  .fc-front:hover{background:#fdf8f3;}
  .fc-term{font-size:16px;font-weight:700;}
  .fc-char{font-size:12px;color:#b08a3e;font-weight:400;margin-left:6px;}
  .fc-zhuyin{font-size:12px;color:#999;font-weight:400;margin-left:6px;}
  .fc-toggle{font-size:12px;color:var(--red-dark);flex-shrink:0;}
  .fc-back{padding:0 14px 12px;font-size:13px;color:#555;display:none;border-top:1px dashed #eee;padding-top:10px;}
  .fc-example{margin-top:6px;color:#888;}
  .fc-check{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 14px;background:#faf6f1;cursor:pointer;}
  .fc-lesson{font-size:11px;color:#bbb;margin-right:8px;}
  .nav-divider{border-top:1px solid #e0cdb8;margin:10px 0;}
  .zyzx-card{background:#fff;border:1px solid #eee;border-radius:10px;margin:10px 0;overflow:hidden;}
  .zyzx-card.reviewed{border-color:#bfe3bf;background:#f7fbf7;}
  .zyzx-head{display:flex;justify-content:space-between;align-items:center;padding:16px;cursor:pointer;}
  .zyzx-head:hover{background:#fdf8f3;}
  .zyzx-big{font-size:34px;font-weight:700;letter-spacing:4px;}
  .zyzx-big .sep{color:#ddb877;margin:0 6px;font-weight:400;}
  .zyzx-lesson-tag{font-size:11px;color:#bbb;display:block;margin-bottom:4px;}
  .zyzx-body{display:none;padding:0 16px 16px;}
  .reading-chip{background:#fff7e6;border:1px solid #f0d9a0;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:14px;}
  .reading-chip .zy{font-weight:700;color:#a9761b;margin-right:8px;font-size:15px;}
  .xingjin-row{background:#fdf3ea;border:1px solid #f3e0c8;border-radius:8px;padding:10px 12px;margin:8px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .xingjin-row .ch{font-size:24px;font-weight:700;min-width:36px;}
  .xingjin-row .zy{color:#a9761b;font-size:13px;font-weight:600;}
  .xingjin-row .ex{font-size:13px;color:#666;}
  .lock-screen{text-align:center;padding:40px 20px;}
  .lock-screen .icon{font-size:48px;}
  .lock-input-row{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  .lock-input-row input{font-size:16px;padding:8px 12px;border:1px solid #ccc;border-radius:6px;width:140px;text-align:center;}
  .lock-error{color:#c0392b;font-size:13px;margin-top:8px;}
  .test-section-title{font-size:16px;font-weight:700;color:var(--red-dark);margin:0 0 6px;}
  .test-meta{font-size:12px;color:#888;margin-bottom:12px;}
  .fillblank-row{margin:6px 0;}
  .fillblank-row input[type=text]{padding:6px 10px;border:1px solid #ccc;border-radius:6px;width:160px;font-size:14px;}
  .relock-row{text-align:right;margin-top:-6px;margin-bottom:10px;}
  .relock-row button{background:#fff;color:var(--red-dark);border:1px solid var(--red-dark);font-size:12px;padding:5px 10px;}
  @media (max-width:760px){.layout{flex-direction:column;}nav{width:100%;}main{padding:14px;}}
</style>
</head>
<body>
<header>
  <h1>📚 Valerie's Summer Chinese Review</h1>
  <a class="back" href="../index.html">← All Subjects</a>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase-config.js"></script>
<script src="../shared/cloudsync.js"></script>
<script src="data.js"></script>
<script src="zyzx-data.js"></script>
<script src="comprehensive-tests-data.js"></script>
<script>
const STORE_KEY = "valerieSummerChineseReview";
let progress = {};
function saveProgress(p){ progress = p; saveSyncedProgress(STORE_KEY, p); }

let viewMode = "week"; // "week" or "zyzx"
let currentWeek = 1;
let currentTab = "vocab"; // "vocab" or "idiom"

function progressKey(week, tab){ return week + "_" + tab; }

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  CHINESE_WEEKS.forEach(w=>{
    const vocabDone = progress[progressKey(w.id,"vocab")]?.completed;
    const idiomDone = progress[progressKey(w.id,"idiom")]?.completed;
    const bothDone = vocabDone && idiomDone;
    const btn = document.createElement("button");
    btn.className = "week-btn" + (bothDone ? " done" : "") + (viewMode==='week' && w.id===currentWeek ? " active" : "");
    const badgeText = bothDone ? "✓" : (vocabDone||idiomDone ? "½" : "-");
    btn.innerHTML = `<span>${w.label}</span><span class="badge">${badgeText}</span>`;
    btn.onclick = ()=>{ viewMode = "week"; currentWeek = w.id; render(); };
    nav.appendChild(btn);
  });
  const divider = document.createElement("div");
  divider.className = "nav-divider";
  nav.appendChild(divider);
  const zyzxBtn = document.createElement("button");
  zyzxBtn.className = "week-btn" + (viewMode==='zyzx' ? " active" : "");
  zyzxBtn.innerHTML = `<span>📖 字音字形總複習</span>`;
  zyzxBtn.onclick = ()=>{ viewMode = "zyzx"; render(); };
  nav.appendChild(zyzxBtn);
  const footer = document.createElement("div");
  footer.className = "nav-footer";
  footer.textContent = CloudSync.enabled ? "✓ 進度已跨裝置同步" : "進度只會儲存在這台裝置上。";
  nav.appendChild(footer);
}

function norm(s){ return String(s); }

function render(){
  renderNav();
  if(viewMode === "zyzx"){ renderZyzxPage(); return; }
  const week = CHINESE_WEEKS.find(w=>w.id===currentWeek);
  const main = document.getElementById("main");

  if(currentTab === "test"){ renderTestPage(week, main); return; }

  const section = week[currentTab]; // {quiz, hasVideo}
  const sectionName = currentTab === "vocab" ? "生字語詞" : "成語";
  const pptFile = currentTab === "vocab" ? "vocab.pdf" : "idiom.pdf";
  const videoFile = currentTab === "vocab" ? "vocab.mp4" : "idiom.mp4";
  const assetBase = `assets/week${week.id}/`;
  const recKey = progressKey(week.id, currentTab);
  const rec = progress[recKey] || {};

  main.innerHTML = `
    <div class="card">
      <span class="section-label">${week.label}</span>
      <h2>${sectionName}複習</h2>
      <div class="tabs">
        <button class="tab-btn ${currentTab==='vocab'?'active':''}" onclick="switchTab('vocab')">生字語詞</button>
        <button class="tab-btn ${currentTab==='idiom'?'active':''}" onclick="switchTab('idiom')">成語</button>
        <button class="tab-btn ${currentTab==='test'?'active':''}" onclick="switchTab('test')">📝 綜合測驗</button>
      </div>
      <div class="resource-row">
        <a href="${assetBase}${pptFile}" target="_blank">📑 開啟簡報 PDF</a>
      </div>
      <embed class="ppt-viewer" src="${assetBase}${pptFile}" type="application/pdf">
    </div>

    <div class="card">
      <span class="section-label">複習影片</span>
      ${section.hasVideo
        ? `<video controls src="${assetBase}${videoFile}"></video>`
        : `<div class="placeholder">影片製作中，請稍後再來看看 🎬</div>`}
    </div>

    <div class="card" id="cardsCard"></div>

    <div class="card" id="quizCard">
      <span class="section-label">測驗（${section.quiz.length} 題）</span>
      <div id="quizBody"></div>
      <button id="submitBtn" onclick="submitQuiz()" ${rec.completed?"disabled":""}>${rec.completed?"已完成測驗":"提交測驗"}</button>
      <div id="scorebox">${rec.completed ? scoreBoxHtml(rec.score) : ""}</div>
    </div>
  `;
  renderQuiz(section.quiz, rec);
  renderCards();
}

let onlyUnreviewed = false;

function cardsKey(week, tab){ return week + "_" + tab + "_cards"; }

function getCardList(week){
  return currentTab === "vocab" ? week.vocabCards : week.idiomCards;
}

function getReviewedArr(week, tab, len){
  const key = cardsKey(week, tab);
  const arr = progress[key] || [];
  while(arr.length < len) arr.push(false);
  return arr;
}

function renderCards(){
  const week = CHINESE_WEEKS.find(w=>w.id===currentWeek);
  const cards = getCardList(week);
  const reviewed = getReviewedArr(week.id, currentTab, cards.length);
  const doneCount = reviewed.filter(Boolean).length;
  const pct = cards.length ? Math.round((doneCount/cards.length)*100) : 0;
  const sectionName = currentTab === "vocab" ? "生字語詞" : "成語";

  const container = document.getElementById("cardsCard");
  container.innerHTML = `
    <span class="section-label">${sectionName}字卡複習（${doneCount}/${cards.length}）</span>
    <div class="progress-bar"><div style="width:${pct}%"></div></div>
    <div class="card-toolbar" style="margin-top:12px;">
      <label><input type="checkbox" id="onlyUnreviewedChk" ${onlyUnreviewed?"checked":""} onchange="toggleOnlyUnreviewed(this.checked)"> 只顯示未複習</label>
      <button onclick="resetCards()" style="background:#fff;color:var(--red-dark);border:1px solid var(--red-dark);">重新開始這組字卡</button>
    </div>
    <div id="cardsList"></div>
  `;
  const list = document.getElementById("cardsList");
  list.innerHTML = cards.map((c, i)=>{
    if(onlyUnreviewed && reviewed[i]) return "";
    const isVocab = currentTab === "vocab";
    const term = isVocab ? c.term : c.term;
    const zhuyin = isVocab ? c.zhuyin : "";
    const charTag = isVocab && c.char ? `<span class="fc-char">（生字：${c.char}）</span>` : "";
    const backText = isVocab ? c.en : c.meaning;
    const example = c.example || "";
    return `<div class="flashcard ${reviewed[i]?'reviewed':''}" id="fc${i}">
      <div class="fc-front" onclick="toggleCardFront(${i})">
        <span><span class="fc-lesson">${c.lesson||""}</span><span class="fc-term">${term}</span>${zhuyin?`<span class="fc-zhuyin">${zhuyin}</span>`:""}${charTag}</span>
        <span class="fc-toggle" id="fcToggle${i}">👁 查看意思</span>
      </div>
      <div class="fc-back" id="fcBack${i}">
        <div>${backText}</div>
        ${example ? `<div class="fc-example">例句：${example}</div>` : ""}
      </div>
      <label class="fc-check">
        <input type="checkbox" ${reviewed[i]?"checked":""} onchange="toggleReviewed(${i}, this.checked)"> ✓ 我複習過了
      </label>
    </div>`;
  }).join("") || `<div class="placeholder">這組都複習完了，太棒了！🎉</div>`;
}

function toggleCardFront(i){
  const back = document.getElementById("fcBack"+i);
  const toggle = document.getElementById("fcToggle"+i);
  const show = back.style.display !== "block";
  back.style.display = show ? "block" : "none";
  toggle.textContent = show ? "🙈 隱藏" : "👁 查看意思";
}

function toggleReviewed(i, checked){
  const week = CHINESE_WEEKS.find(w=>w.id===currentWeek);
  const cards = getCardList(week);
  const key = cardsKey(week.id, currentTab);
  const arr = getReviewedArr(week.id, currentTab, cards.length);
  arr[i] = checked;
  progress[key] = arr;
  saveProgress(progress);
  renderCards();
}

function toggleOnlyUnreviewed(checked){
  onlyUnreviewed = checked;
  renderCards();
}

function resetCards(){
  const week = CHINESE_WEEKS.find(w=>w.id===currentWeek);
  const key = cardsKey(week.id, currentTab);
  delete progress[key];
  saveProgress(progress);
  renderCards();
}

function switchTab(tab){ currentTab = tab; render(); }

// ================== 字音字形總複習 ==================
let zyzxTab = "duoyin"; // "duoyin" or "xingjin"
let zyzxOnlyUnreviewed = false;

function zyzxList(){ return zyzxTab === "duoyin" ? ZYZX_DUOYIN : ZYZX_XINGJIN; }
function zyzxProgressKey(){ return "zyzx_" + zyzxTab + "_cards"; }
function zyzxReviewedArr(){
  const len = zyzxList().length;
  const arr = progress[zyzxProgressKey()] || [];
  while(arr.length < len) arr.push(false);
  return arr;
}

function splitReading(r){
  const idx = r.indexOf("／");
  if(idx === -1) return { zy: "", rest: r };
  return { zy: r.slice(0,idx), rest: r.slice(idx+1) };
}
function splitXingjinItem(it){
  const ci = it.indexOf("：");
  const charPart = ci === -1 ? it : it.slice(0,ci);
  const rest = ci === -1 ? "" : it.slice(ci+1);
  const si = rest.indexOf("／");
  if(si === -1) return { ch: charPart, zy: rest, ex: "" };
  return { ch: charPart, zy: rest.slice(0,si), ex: rest.slice(si+1) };
}

function renderZyxToolbar(doneCount, total, pct, title){
  return `
    <span class="section-label">${title}（${doneCount}/${total}）</span>
    <div class="progress-bar"><div style="width:${pct}%"></div></div>
    <div class="card-toolbar" style="margin-top:12px;">
      <label><input type="checkbox" ${zyzxOnlyUnreviewed?"checked":""} onchange="toggleZyzxOnlyUnreviewed(this.checked)"> 只顯示未複習</label>
      <button onclick="resetZyzxCards()" style="background:#fff;color:var(--red-dark);border:1px solid var(--red-dark);">重新開始這組複習</button>
    </div>`;
}

function renderZyzxPage(){
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="card">
      <span class="section-label">整學年總複習</span>
      <h2>字音字形總複習</h2>
      <div class="tabs">
        <button class="tab-btn ${zyzxTab==='duoyin'?'active':''}" onclick="switchZyzxTab('duoyin')">多音字（${ZYZX_DUOYIN.length}）</button>
        <button class="tab-btn ${zyzxTab==='xingjin'?'active':''}" onclick="switchZyzxTab('xingjin')">形近字／易混淆字（${ZYZX_XINGJIN.length}）</button>
      </div>
      <p style="font-size:13px;color:#888;margin:0;">${zyzxTab==='duoyin' ? "點一下字，猜猜看它有幾種讀音，再翻開答案對照！" : "這些字長得很像，點開看看每個字怎麼唸、怎麼用！"}</p>
    </div>
    <div class="card" id="zyzxCardsCard"></div>
  `;
  renderZyzxCards();
}

function switchZyzxTab(tab){ zyzxTab = tab; renderZyzxPage(); }
function toggleZyzxOnlyUnreviewed(checked){ zyzxOnlyUnreviewed = checked; renderZyzxCards(); }

function resetZyzxCards(){
  delete progress[zyzxProgressKey()];
  saveProgress(progress);
  renderZyzxCards();
}

function toggleZyzxReviewed(i, checked){
  const arr = zyzxReviewedArr();
  arr[i] = checked;
  progress[zyzxProgressKey()] = arr;
  saveProgress(progress);
  renderZyzxCards();
}

function toggleZyzxFront(i){
  const body = document.getElementById("zyBody"+i);
  const toggle = document.getElementById("zyToggle"+i);
  const show = body.style.display !== "block";
  body.style.display = show ? "block" : "none";
  toggle.textContent = show ? "🙈 隱藏" : "👁 查看答案";
}

function renderZyzxCards(){
  const list = zyzxList();
  const reviewed = zyzxReviewedArr();
  const doneCount = reviewed.filter(Boolean).length;
  const pct = list.length ? Math.round((doneCount/list.length)*100) : 0;
  const title = zyzxTab === "duoyin" ? "多音字複習" : "形近字複習";

  const container = document.getElementById("zyzxCardsCard");
  container.innerHTML = renderZyxToolbar(doneCount, list.length, pct, title) + `<div id="zyzxList"></div>`;

  const listEl = document.getElementById("zyzxList");
  if(zyzxTab === "duoyin"){
    listEl.innerHTML = list.map((d,i)=>{
      if(zyzxOnlyUnreviewed && reviewed[i]) return "";
      const chips = d.readings.map(r=>{
        const {zy, rest} = splitReading(r);
        return `<div class="reading-chip"><span class="zy">${zy}</span>${rest}</div>`;
      }).join("");
      return `<div class="zyzx-card ${reviewed[i]?'reviewed':''}" id="zy${i}">
        <div class="zyzx-head" onclick="toggleZyzxFront(${i})">
          <span><span class="zyzx-lesson-tag">${d.lesson}</span><span class="zyzx-big">${d.char}</span></span>
          <span class="fc-toggle" id="zyToggle${i}">👁 查看答案（${d.readings.length} 種讀音）</span>
        </div>
        <div class="zyzx-body" id="zyBody${i}">
          ${chips}
          <label class="fc-check" style="margin-top:8px;border-radius:6px;">
            <input type="checkbox" ${reviewed[i]?"checked":""} onchange="toggleZyzxReviewed(${i}, this.checked)"> ✓ 我複習過了
          </label>
        </div>
      </div>`;
    }).join("") || `<div class="placeholder">這組都複習完了，太棒了！🎉</div>`;
  } else {
    listEl.innerHTML = list.map((x,i)=>{
      if(zyzxOnlyUnreviewed && reviewed[i]) return "";
      const charsBig = x.items.map(it=>splitXingjinItem(it).ch).join(`<span class="sep">／</span>`);
      const rows = x.items.map(it=>{
        const {ch, zy, ex} = splitXingjinItem(it);
        return `<div class="xingjin-row"><span class="ch">${ch}</span><span class="zy">${zy}</span><span class="ex">${ex}</span></div>`;
      }).join("");
      return `<div class="zyzx-card ${reviewed[i]?'reviewed':''}" id="zy${i}">
        <div class="zyzx-head" onclick="toggleZyzxFront(${i})">
          <span><span class="zyzx-lesson-tag">${x.lesson}</span><span class="zyzx-big">${charsBig}</span></span>
          <span class="fc-toggle" id="zyToggle${i}">👁 查看答案</span>
        </div>
        <div class="zyzx-body" id="zyBody${i}">
          ${rows}
          <label class="fc-check" style="margin-top:8px;border-radius:6px;">
            <input type="checkbox" ${reviewed[i]?"checked":""} onchange="toggleZyzxReviewed(${i}, this.checked)"> ✓ 我複習過了
          </label>
        </div>
      </div>`;
    }).join("") || `<div class="placeholder">這組都複習完了，太棒了！🎉</div>`;
  }
}

function renderQuiz(quiz, rec){
  const body = document.getElementById("quizBody");
  body.innerHTML = quiz.map((item,i)=>{
    const chosen = rec.answers ? rec.answers[i] : undefined;
    const optsHtml = item.options.map((opt,j)=>{
      let cls = "opt-row";
      if(rec.completed){
        if(j === item.correct) cls += " correct";
        else if(j === chosen && chosen !== item.correct) cls += " wrong";
      }
      const checked = chosen === j ? "checked" : "";
      return `<label class="${cls}">
        <input type="radio" name="q${i}" value="${j}" ${checked} ${rec.completed?"disabled":""}>
        <span>${opt}</span>
      </label>`;
    }).join("");
    return `<div class="prob">
      <p>${i+1}. ${item.q}</p>
      ${optsHtml}
      ${item.hint ? `<div class="hint" id="hint${i}" style="${rec.completed?'':'display:none'}">💡 ${item.hint}</div>` : ""}
    </div>`;
  }).join("");
}

function scoreBoxHtml(score){
  return `<div class="scorebox">分數：<b>${score}%</b>
    <div class="progress-bar"><div style="width:${score}%"></div></div></div>`;
}

function submitQuiz(){
  const week = CHINESE_WEEKS.find(w=>w.id===currentWeek);
  const section = week[currentTab];
  const quiz = section.quiz;
  let correctCount = 0;
  const answers = quiz.map((item,i)=>{
    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    const val = checked ? parseInt(checked.value) : -1;
    if(val === item.correct) correctCount++;
    return val;
  });
  const score = Math.round((correctCount/quiz.length)*100);
  progress[progressKey(week.id,currentTab)] = { completed:true, score, answers, date:new Date().toISOString() };
  saveProgress(progress);
  render();
}

// ================== 綜合測驗（家長解鎖才能作答） ==================
const TEST_PASSWORD_HASH = "d6e5a20b30f87216b2c758f5e7a23c437dbc3dfa1ccb177c474de152bb0ef731";

async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function testKey(weekId){ return weekId + "_compTest"; }
function getTestRec(weekId){ return progress[testKey(weekId)] || {}; }
function saveTestRec(weekId, patch){
  const key = testKey(weekId);
  progress[key] = { ...(progress[key]||{}), ...patch, date:new Date().toISOString() };
  saveProgress(progress);
}

function normFill(s){
  return String(s||"").trim().replace(/[、,，.\s]/g, "");
}

async function attemptUnlock(weekId){
  const input = document.getElementById("unlockPw").value;
  const errEl = document.getElementById("unlockErr");
  const hash = await sha256Hex(input);
  if(hash === TEST_PASSWORD_HASH){
    saveTestRec(weekId, { unlocked: true });
    render();
  } else {
    errEl.textContent = "密碼不對，請再試一次。";
    document.getElementById("unlockPw").value = "";
  }
}

function relockTest(weekId){
  saveTestRec(weekId, { unlocked: false });
  render();
}

function renderTestPage(week, main){
  const data = COMPREHENSIVE_TESTS[week.id];
  const rec = getTestRec(week.id);

  if(!data){
    main.innerHTML = `<div class="card"><span class="section-label">綜合測驗</span><div class="placeholder">這一週還沒有綜合測驗。</div></div>`;
    return;
  }

  if(!rec.unlocked){
    main.innerHTML = `
      <div class="card lock-screen">
        <div class="icon">🔒</div>
        <h2>此測驗尚未開放</h2>
        <p style="color:#888;font-size:13px;">這份綜合測驗需要家長輸入密碼解鎖，才能讓孩子作答。</p>
        <div class="lock-input-row">
          <input type="password" id="unlockPw" placeholder="輸入密碼" onkeydown="if(event.key==='Enter') attemptUnlock(${week.id})">
          <button onclick="attemptUnlock(${week.id})">🔓 解鎖測驗</button>
        </div>
        <div class="lock-error" id="unlockErr"></div>
      </div>
    `;
    return;
  }

  const mcRec = rec.mc || {};
  const fillRec = rec.fillBlank || {};
  const idiomRec = rec.idiomMc || {};
  const sentenceVals = rec.sentence || {};

  main.innerHTML = `
    <div class="relock-row"><button onclick="relockTest(${week.id})">🔒 重新鎖定測驗</button></div>

    <div class="card">
      <span class="section-label">${data.title}</span>
      <p class="test-section-title">一、選擇題</p>
      <p class="test-meta">共 ${data.mc.length} 題</p>
      <div id="testMcBody"></div>
      <button id="testMcBtn" onclick="checkTestSection(${week.id},'mc')" ${mcRec.completed?"disabled":""}>${mcRec.completed?"全部正確 ✓":"檢查答案"}</button>
      <div id="testMcScore">${mcRec.completed ? testScoreBoxHtml(mcRec) : ""}</div>
    </div>

    <div class="card">
      <p class="test-section-title">二、語詞填空</p>
      <p class="test-meta">語詞庫：${data.fillBlank.bank.join("、")}</p>
      <div id="testFillBody"></div>
      <button id="testFillBtn" onclick="checkTestSection(${week.id},'fillBlank')" ${fillRec.completed?"disabled":""}>${fillRec.completed?"全部正確 ✓":"檢查答案"}</button>
      <div id="testFillScore">${fillRec.completed ? testScoreBoxHtml(fillRec) : ""}</div>
    </div>

    <div class="card">
      <p class="test-section-title">三、造句練習</p>
      <p class="test-meta">這部分由家長親自批改，不會自動評分。</p>
      <div id="testSentenceBody"></div>
    </div>

    <div class="card">
      <p class="test-section-title">四、成語測驗</p>
      <p class="test-meta">共 ${data.idiomMc.length} 題（選擇題）</p>
      <div id="testIdiomBody"></div>
      <button id="testIdiomBtn" onclick="checkTestSection(${week.id},'idiomMc')" ${idiomRec.completed?"disabled":""}>${idiomRec.completed?"全部正確 ✓":"檢查答案"}</button>
      <div id="testIdiomScore">${idiomRec.completed ? testScoreBoxHtml(idiomRec) : ""}</div>
    </div>
  `;

  renderTestMc(data, mcRec);
  renderTestFillBlank(data, fillRec);
  renderTestSentences(week.id, data, sentenceVals);
  renderTestIdiomMc(data, idiomRec);
}

function testScoreBoxHtml(sectionRec){
  const initial = typeof sectionRec.initialScore === "number" ? sectionRec.initialScore : sectionRec.score;
  const sameAsFinal = initial === sectionRec.score;
  return `<div class="scorebox">分數：<b>${sectionRec.score}%</b>
    <div class="progress-bar"><div style="width:${sectionRec.score}%"></div></div>
    ${sameAsFinal ? "" : `<div style="margin-top:8px;font-size:13px;color:#555;">第一次作答：<b>${initial}%</b></div>`}
  </div>`;
}

function renderTestMc(data, rec){
  const body = document.getElementById("testMcBody");
  body.innerHTML = data.mc.map((item,i)=>{
    const chosen = rec.answers ? rec.answers[i] : undefined;
    const optsHtml = item.options.map((opt,j)=>{
      const checked = chosen === j ? "checked" : "";
      return `<label class="opt-row">
        <input type="radio" name="testmc${i}" value="${j}" ${checked} ${rec.completed?"disabled":""}>
        <span>${opt}</span>
      </label>`;
    }).join("");
    return `<div class="prob">
      <p>${i+1}. ${item.q}</p>
      ${optsHtml}
      <div class="test-result" id="testmcResult${i}"></div>
    </div>`;
  }).join("");
  if(rec.checked || rec.completed){
    data.mc.forEach((item,i)=>{
      const el = document.getElementById(`testmcResult${i}`);
      const ok = rec.answers[i] === item.correct;
      el.innerHTML = ok ? `<span class="ok">✓ 正確</span>` : `<span class="bad">✗ 不對，再試一次</span>`;
    });
  }
}

function renderTestFillBlank(data, rec){
  const body = document.getElementById("testFillBody");
  body.innerHTML = data.fillBlank.items.map((item,i)=>{
    const val = rec.answers ? (rec.answers[i]||"") : "";
    return `<div class="fillblank-row">
      <span>${i+1}. ${item.q}</span>
      <input type="text" id="testfill${i}" value="${val}" ${rec.completed?"disabled":""}>
      <span id="testfillResult${i}"></span>
    </div>`;
  }).join("");
  if(rec.checked || rec.completed){
    data.fillBlank.items.forEach((item,i)=>{
      const el = document.getElementById(`testfillResult${i}`);
      const given = (rec.answers && rec.answers[i]) || "";
      const ok = normFill(given) === normFill(item.answer);
      el.innerHTML = ok ? ` <span class="ok">✓</span>` : ` <span class="bad">✗ 不對，再試一次</span>`;
    });
  }
}

  body.innerHTML = data.idiomMc.map((item,i)=>{

let testSentenceTimers = {};
function renderTestSentences(weekId, data, sentenceVals){
  const body = document.getElementById("testSentenceBody");
  body.innerHTML = data.sentence.map((item,i)=>{
    const val = sentenceVals[i] || "";
    return `<div class="prob">
      <p>${i+1}. 請用「${item.term}」造一句完整的句子。</p>
      <p style="font-weight:400;color:#888;font-size:12px;">提示：${item.hint}</p>
      <textarea id="testSentence${i}" placeholder="我的句子...">${val}</textarea>
      <div class="save-status" id="testSentenceStatus${i}"></div>
    </div>`;
  }).join("");
  data.sentence.forEach((item,i)=>{
    document.getElementById(`testSentence${i}`).addEventListener("input", (e)=>{
      document.getElementById(`testSentenceStatus${i}`).textContent = "儲存中…";
      clearTimeout(testSentenceTimers[i]);
      testSentenceTimers[i] = setTimeout(()=>{
        const rec = getTestRec(weekId);
        const sentence = { ...(rec.sentence||{}), [i]: e.target.value };
        saveTestRec(weekId, { sentence });
        document.getElementById(`testSentenceStatus${i}`).textContent = "✓ 已儲存";
      }, 500);
    });
  });
}

function checkTestSection(weekId, sectionKey){
  const data = COMPREHENSIVE_TESTS[weekId];
  const items = sectionKey === "fillBlank" ? data.fillBlank.items : data[sectionKey];
  const existing = getTestRec(weekId)[sectionKey] || {};
  let correctCount = 0;
  const answers = items.map((item,i)=>{
    if(sectionKey === "fillBlank"){
      const val = document.getElementById(`testfill${i}`).value;
      if(normFill(val) === normFill(item.answer)) correctCount++;
      return val;
    } else {
      const checked = document.querySelector(`input[name="test${sectionKey==='mc'?'mc':'idiom'}${i}"]:checked`);
      const val = checked ? parseInt(checked.value) : -1;
      if(val === item.correct) correctCount++;
      return val;
    }
  });
  const allCorrect = correctCount === items.length;
  const now = new Date().toISOString();
  const newSectionRec = { ...existing, answers, checked:true, completed:allCorrect, date:now };

  if(!existing.checked){
    newSectionRec.initialAnswers = answers.slice();
    newSectionRec.initialScore = Math.round((correctCount/items.length)*100);
  }
  if(allCorrect){
    newSectionRec.score = 100;
  } else {
    delete newSectionRec.score;
  }

  const rec = getTestRec(weekId);
  saveTestRec(weekId, { [sectionKey]: newSectionRec });
  render();
}

initSyncedProgress(STORE_KEY).then(p => { progress = p; render(); });
