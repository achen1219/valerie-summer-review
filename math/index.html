<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valerie's Summer Math Review</title>
<style>
  :root{
    --blue:#2f6fb0; --blue-dark:#1f4d80; --green:#3aa655; --gray:#9aa5b1;
    --bg:#f4f7fb; --card:#ffffff; --text:#243447; --accent:#f0a93c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--blue-dark);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{margin:0;font-size:20px;}
  header a.back{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;}
  .stats{display:flex;gap:18px;font-size:14px;}
  .stats b{font-size:18px;display:block;}
  .layout{display:flex;min-height:calc(100vh - 64px);}
  nav{width:240px;background:#e9eef5;padding:12px;overflow-y:auto;flex-shrink:0;}
  .week-block{margin-bottom:10px;}
  .week-title{font-weight:600;font-size:13px;color:var(--blue-dark);padding:6px 4px;}
  .day-btn{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;border:none;background:#fff;border-radius:6px;padding:8px 10px;margin:4px 0;cursor:pointer;font-size:13px;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .day-btn.active{outline:2px solid var(--blue);}
  .day-btn .badge{font-size:11px;border-radius:10px;padding:1px 7px;color:#fff;background:var(--gray);}
  .day-btn.done .badge{background:var(--green);}
  main{flex:1;padding:24px;max-width:780px;}
  .card{background:var(--card);border-radius:10px;padding:20px 24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .card h2{margin-top:0;color:var(--blue-dark);}
  .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;margin-bottom:10px;}
  .prob{margin:14px 0;padding-bottom:12px;border-bottom:1px solid #eee;}
  .prob:last-child{border-bottom:none;}
  .prob p{margin:0 0 8px;}
  .answer-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .answer-row input[type=text]{padding:6px 8px;border:1px solid #ccc;border-radius:6px;width:140px;}
  button{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;}
  button:hover{background:var(--blue-dark);}
  button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue);}
  .reveal{margin-top:6px;font-size:13px;color:#555;display:none;}
  .test-result{margin-top:6px;font-size:13px;font-weight:600;}
  .ok{color:var(--green);}
  .bad{color:#c0392b;}
  .scorebox{margin-top:14px;padding:14px;border-radius:8px;background:#eef6ee;font-size:15px;}
  .progress-bar{width:100%;background:#dfe6ee;border-radius:6px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-bar > div{height:100%;background:var(--green);}
  .intro{font-size:14px;line-height:1.5;}
  .nav-footer{font-size:11px;color:#7a8493;padding:10px 6px;}
  @media (max-width:760px){.layout{flex-direction:column;}nav{width:100%;}main{padding:16px;}}
</style>
</head>

// assign sequential ids and day-of-week labels (Mon-Fri)
const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri"];
CURRICULUM.forEach((d,i)=>{ d.id = i+1; d.dayName = DAY_NAMES[d.day-1]; });

// ---------- STORAGE ----------
const STORE_KEY = "valerieSummerMathReview";
function saveProgress(p){ progress = p; saveSyncedProgress(STORE_KEY, p); }
let progress = {};

// ---------- HELPERS ----------
function norm(s){
  return String(s).trim().toLowerCase().replace(/\s+/g,"").replace(/%$/,"").replace(/°/g,"");
}
function isCorrect(given, accepted){
  const g = norm(given);
  return accepted.some(a => norm(a) === g);
}

// ---------- RENDER NAV ----------
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  for(let w=1; w<=6; w++){
    const block = document.createElement("div");
    block.className = "week-block";
    const title = document.createElement("div");
    title.className = "week-title";
    title.textContent = "Week " + w;
    block.appendChild(title);
    CURRICULUM.filter(d=>d.week===w).forEach(d=>{
      const btn = document.createElement("button");
      const rec = progress[d.id];
      btn.className = "day-btn" + (rec && rec.completed ? " done" : "") + (d.id===currentId ? " active" : "");
      btn.innerHTML = `<span>${d.dayName} · D${d.id}</span><span class="badge">${rec && rec.completed ? initialScoreOf(rec)+"%" : "-"}</span>`;
      btn.onclick = ()=>{ currentId = d.id; render(); };
      block.appendChild(btn);
    });
    nav.appendChild(block);
  }
  const footer = document.createElement("div");
  footer.className = "nav-footer";
  footer.textContent = CloudSync.enabled ? "✓ Progress synced across devices" : "Progress is saved on this device only.";
  nav.appendChild(footer);
}

// ---------- RENDER STATS ----------
function initialScoreOf(r){
  // older completed records (saved before resubmission tracking existed)
  // only have r.score — fall back to that.
  return typeof r.initialScore === "number" ? r.initialScore : r.score;
}

function renderStats(){
  const recs = Object.values(progress).filter(r=>r.completed);
  document.getElementById("statDone").textContent = recs.length + "/30";
  const scored = recs.map(initialScoreOf).filter(s=>typeof s === "number");
  const avg = scored.length ? Math.round(scored.reduce((s,v)=>s+v,0)/scored.length) : null;
  document.getElementById("statAvg").textContent = avg===null ? "--" : avg+"%";
  // streak: consecutive completed days counting back from the highest completed id
  let streak = 0;
  let maxDone = Math.max(0, ...Object.keys(progress).filter(k=>progress[k].completed).map(Number));
  for(let id=maxDone; id>=1; id--){
    if(progress[id] && progress[id].completed) streak++; else break;
  }
  document.getElementById("statStreak").textContent = streak;
}

// ---------- RENDER MAIN ----------
let currentId = 1;
function pickStartId(){
  const firstUndone = CURRICULUM.find(d=>!(progress[d.id] && progress[d.id].completed));
  return firstUndone ? firstUndone.id : 1;
}

function render(){
  renderNav();
  renderStats();
  const day = CURRICULUM.find(d=>d.id===currentId);
  const main = document.getElementById("main");
  const rec = progress[day.id] || {};

  let practiceHtml = day.practice.map((p,i)=>`
    <div class="prob">
      <p><b>${i+1}.</b> ${p.q}</p>
      <button class="secondary" onclick="toggleReveal(this)">Show Answer</button>
      <div class="reveal">Answer: ${p.a[0]}</div>
    </div>`).join("");

  let testHtml = day.test.map((t,i)=>`
    <div class="prob">
      <p><b>${i+1}.</b> ${t.q}</p>
      <div class="answer-row">
        <input type="text" id="t_${day.id}_${i}" ${rec.completed?"disabled":""} value="${rec.answers ? (rec.answers[i]||"") : ""}">
      </div>
      <div class="test-result" id="r_${day.id}_${i}"></div>
    </div>`).join("");

  main.innerHTML = `
    <div class="card">
      <span class="section-label">Week ${day.week} · ${day.dayName} · Day ${day.id} of 30</span>
      <h2>${day.title}</h2>
      <div class="intro">${day.concept}</div>
    </div>
    <div class="card">
      <span class="section-label">Practice (untimed, ~15 min)</span>
      ${practiceHtml}
    </div>
    <div class="card">
      <span class="section-label">Test (~10-15 min)</span>
      ${testHtml}
      <button id="submitBtn" onclick="submitTest(${day.id})" ${rec.completed?"disabled":""}>${rec.completed?"Test Submitted":"Check Answers"}</button>
      <div id="scorebox">${rec.completed ? scoreBoxHtml(rec) : ""}</div>
    </div>
    ${reviewSectionHtml(day, rec)}
    <div class="card" style="display:flex;justify-content:space-between;">
      <button class="secondary" onclick="goAdjacent(-1)" ${day.id<=1?"disabled":""}>&larr; Previous Day</button>
      <button class="secondary" onclick="goAdjacent(1)" ${day.id>=30?"disabled":""}>Next Day &rarr;</button>
    </div>
  `;
  if(rec.checked || rec.completed){
    day.test.forEach((t,i)=>{
      const el = document.getElementById(`r_${day.id}_${i}`);
      const given = rec.answers[i] || "";
      const ok = isCorrect(given, t.a);
      el.innerHTML = ok ? `<span class="ok">✓ Correct</span>` : `<span class="bad">✗ Not quite — try again</span>`;
    });
  }
}

function scoreBoxHtml(rec){
  const initial = initialScoreOf(rec);
  const sameAsFinal = initial === rec.score;
  return `<div class="scorebox">Score: <b>${rec.score}%</b>
    <div class="progress-bar"><div style="width:${rec.score}%"></div></div>
    ${sameAsFinal ? "" : `<div style="margin-top:8px;font-size:13px;color:#555;">First attempt: <b>${initial}%</b> — corrected ${rec.wrongOnFirstTry ? rec.wrongOnFirstTry.length : ""} question(s) on resubmission.</div>`}
  </div>`;
}

function reviewSectionHtml(day, rec){
  if(!rec.completed || !rec.wrongOnFirstTry || rec.wrongOnFirstTry.length === 0) return "";
  const items = rec.wrongOnFirstTry.map(i=>`
    <div class="prob">
      <p><b>Q${i+1}.</b> ${day.test[i].q}</p>
      <div style="font-size:13px;color:#555;">
        Your first answer: <span class="bad">"${(rec.initialAnswers && rec.initialAnswers[i]) || "(blank)"}"</span> — incorrect<br>
        Corrected to: <span class="ok">"${rec.answers[i]}"</span> on resubmission
      </div>
    </div>`).join("");
  return `
    <div class="card">
      <span class="section-label">Review: Corrected After Resubmission</span>
      ${items}
    </div>`;
}

function toggleReveal(btn){
  const div = btn.nextElementSibling;
  div.style.display = div.style.display === "block" ? "none" : "block";
}

function submitTest(dayId){
  const day = CURRICULUM.find(d=>d.id===dayId);
  const existing = progress[dayId] || {};
  let correctCount = 0;
  const answers = day.test.map((t,i)=>{
    const val = document.getElementById(`t_${dayId}_${i}`).value;
    if(isCorrect(val, t.a)) correctCount++;
    return val;
  });
  const allCorrect = correctCount === day.test.length;
  const now = new Date().toISOString();

  const rec = { ...existing, answers, checked: true, completed: allCorrect, date: now };

  if(!existing.checked){
    // first time checking this day's test — record the initial attempt
    // permanently, before any resubmission can change it.
    rec.initialAnswers = answers.slice();
    rec.initialScore = Math.round((correctCount/day.test.length)*100);
    rec.wrongOnFirstTry = day.test.map((t,i)=>i).filter(i=>!isCorrect(answers[i], day.test[i].a));
    rec.firstCheckedDate = now;
  }

  if(allCorrect){
    rec.score = 100;
    rec.completedDate = now;
  } else {
    delete rec.score;
  }

  progress[dayId] = rec;
  saveProgress(progress);
  render();
}

function goAdjacent(delta){
  const newId = currentId + delta;
  if(newId>=1 && newId<=30){ currentId = newId; render(); }
}

initSyncedProgress(STORE_KEY).then(p => { progress = p; currentId = pickStartId(); render(); });
</script>
